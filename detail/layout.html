<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Layout</title>
    <link rel="stylesheet" href="../styling/style.css" />
    <link rel="stylesheet" href="../styling/detail.css" />
  </head>
  <body>
    <header>
      <nav>
        <ul>
          <li><a href="/">Malia</a></li>
          <li><a href="/detail/layout.html">Layout</a></li>
          <li><a href="/detail/medien.html">Medien</a></li>
        </ul>
      </nav>
    </header>
    <main>
      <section>
        <h2>Position und Überlagerung</h2>
        <div class="container relative">
          <div class="box">static</div>
        </div>
        <div class="container absolute">
          <div class="box">relative</div>
          <div class="box absolute">absolute</div>
        </div>
      </section>
      <section>
        <h2>Flexbox</h2>
        <h3>Eindimensionales Layout (horizontal oder vertikal)</h3>
        <div class="container flex">
          <div class="box">1</div>
          <div class="box">2</div>
          <div class="box">3</div>
          <div class="box">4</div>
          <div class="box">5</div>
          <div class="box">6</div>
        </div>
      </section>
      <section>
        <h2>Grid</h2>
        <h3>Zweidimensionales Layout (horizontal und vertikal)</h3>
        <div class="container grid grid_special">
          <div class="box">1</div>
          <div class="box">2</div>
          <div class="box">3</div>
          <div class="box">4</div>
          <div class="box">5</div>
          <div class="box">6</div>
          <div class="box">7</div>
          <div class="box">8</div>
          <div class="box">9</div>
        </div>
      </section>
      <section>
        <h2>Overflow</h2>
        <h3>Horizontales Scrollen bei Überlauf</h3>
        <div class="container container_overflow">
          <div class="box">1</div>
          <div class="box">2</div>
          <div class="box">3</div>
          <div class="box">4</div>
          <div class="box">5</div>
          <div class="box">6</div>
          <div class="box">7</div>
        </div>
      </section>
    </main>
  </body>
</html>
