<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Layout</title>
    <link rel="stylesheet" href="../styling/style.css" />
    <link rel="stylesheet" href="../styling/detail.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css" />
  </head>
  <body>
    <header>
      <nav>
        <ul>
          <li><a href="/">Malia</a></li>
          <li><a href="/detail/layout.html">Layout</a></li>
          <li><a href="/detail/medien.html">Medien</a></li>
          <li><a href="/detail/animation.html">Animation</a></li>
        </ul>
      </nav>
      <div class="burger-icon">
        <svg aria-hidden="true" focusable="false" data-prefix="far" data-icon="bars" class="svg-inline--fa fa-bars fa-w-14" role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512"><path fill="var(--burger-color)" d="M436 124H12c-6.627 0-12-5.373-12-12V80c0-6.627 5.373-12 12-12h424c6.627 0 12 5.373 12 12v32c0 6.627-5.373 12-12 12zm0 160H12c-6.627 0-12-5.373-12-12v-32c0-6.627 5.373-12 12-12h424c6.627 0 12 5.373 12 12v32c0 6.627-5.373 12-12 12zm0 160H12c-6.627 0-12-5.373-12-12v-32c0-6.627 5.373-12 12-12h424c6.627 0 12 5.373 12 12v32c0 6.627-5.373 12-12 12z"></path></svg>
      </div>
    </header>
    <main>
      <section>
        <h2>CSS States & Transitions</h2>
        <div class="container flex css-states">
          <button>Keine Transition</button>
          <button class="transition-regular">Reguläre Transition</button>
          <button class="transition-delayed">Verzögerte Transition</button>
          <div class="box hover-trigger">
            <div class="box-inner transition-regular"></div>
          </div>
        </div>
      </section>
      <section>
        <h2>CSS Animations</h2>
        <div class="container flex css-animations">
          <div class="box animation-rotate"></div>
          <div class="box animation-pulse"></div>
          <div class="box animation-bounce"></div>
        </div>
      </section>
      <section>
        <h2>Jquery</h2>
        <div class="container grid jquery">
          <button id="trigger-1" class="trigger">Trigger</button>
          <div class="box target" id="target-1">Target</div>
          <!-- <button id="trigger-2" class="trigger">Trigger</button>
          <div class="box target" id="target-2">Target</div>
          <button id="trigger-3" class="trigger">Trigger</button>
          <div class="box target" id="target-3">Target</div> -->
        </div>
      </section>
      <section>
        <h2>Libraries: Swiper</h2>
        <div class="container swiper-container">
          <div class="swiper">
          <!-- Additional required wrapper -->
          <div class="swiper-wrapper">
            <!-- Slides -->
            <div class="swiper-slide">
              <div class="box-container">
                <div class="box">Box 1</div>
              </div>
            </div>
            <div class="swiper-slide">
              <div class="box-container">
                <div class="box">Box 2</div>
              </div>
            </div>
            <div class="swiper-slide">
              <div class="box-container">
                <div class="box">Box 3</div>
              </div>
            </div>
            ...
          </div>
          <!-- If we need pagination -->
          <div class="swiper-pagination"></div>

          <!-- If we need navigation buttons -->
          <div class="swiper-button-prev"></div>
          <div class="swiper-button-next"></div>

          <!-- If we need scrollbar -->
          <div class="swiper-scrollbar"></div>
        </div>
        </div>
      </section>
    </main>
  </body>
  <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="../scripts/script.js"></script>
</html>
